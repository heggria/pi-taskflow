<svg width="1280" height="660" viewBox="0 0 1280 660" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="taskflow — a declarative DAG of subagents: one source fans out, branches route conditionally, a gate guards quality, and only the final result returns to your context. 9 phase types, zero deps, runs on Pi and Codex.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="660" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A0E18"/>
      <stop offset="1" stop-color="#0C1120"/>
    </linearGradient>
    <radialGradient id="glowL" cx="0" cy="0" r="1" gradientTransform="translate(300 400) scale(560 380)">
      <stop offset="0" stop-color="#6E8BFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#6E8BFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="0" cy="0" r="1" gradientTransform="translate(1120 440) scale(420 300)">
      <stop offset="0" stop-color="#43D9AD" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#43D9AD" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ti" x1="455" y1="0" x2="825" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8AB4FF"/>
      <stop offset="0.5" stop-color="#B692FF"/>
      <stop offset="1" stop-color="#43D9AD"/>
    </linearGradient>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#9FB0FF" fill-opacity="0.035"/>
    </pattern>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect x="1" y="1" width="1278" height="658" rx="28" fill="url(#bg)"/>
  <rect x="1" y="1" width="1278" height="658" rx="28" fill="url(#dots)"/>
  <rect x="1" y="1" width="1278" height="658" rx="28" fill="url(#glowL)"/>
  <rect x="1" y="1" width="1278" height="658" rx="28" fill="url(#glowR)"/>
  <rect x="1.5" y="1.5" width="1277" height="657" rx="27.5" stroke="#283357" stroke-opacity="0.55"/>

  <!-- ============ TITLE ============ -->
  <rect x="487" y="40" width="306" height="34" rx="17" fill="#0F1526" stroke="#2C3A60"/>
  <circle cx="512" cy="57" r="4.5" fill="#43D9AD"/>
  <text x="530" y="62" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="13.5" letter-spacing="1.2" fill="#9DA9C9">Pi · Codex · zero deps</text>

  <text x="640" y="166" text-anchor="middle" font-family="ui-monospace,'SF Mono','JetBrains Mono',Menlo,monospace" font-size="84" font-weight="700" letter-spacing="-2" fill="url(#ti)">taskflow</text>
  <text x="640" y="206" text-anchor="middle" font-family="system-ui,'Segoe UI',Helvetica,Arial,sans-serif" font-size="21" font-weight="500" fill="#C6CFE8">One declarative graph. Nine kinds of phase. Only the result returns.</text>

  <!-- ============ RUNTIME BOUNDARY (holds the whole DAG) ============ -->
  <rect x="60" y="262" width="858" height="330" rx="20" fill="#0B111F" fill-opacity="0.62" stroke="#243154" stroke-dasharray="7 6"/>
  <rect x="84" y="246" width="246" height="26" rx="13" fill="#111A2E" stroke="#2C3A60"/>
  <circle cx="102" cy="259" r="4" fill="#A78BFA"/>
  <text x="116" y="263" font-family="ui-monospace,Menlo,monospace" font-size="11.5" letter-spacing="1" fill="#9AA7CC">RUNTIME · isolated context</text>

  <!-- =========================================================
       THE DAG — 4 layers, clean fan-out → fan-in, no crossings
       Layer A: source            (1 node)
       Layer B: parallel/map      (3 nodes, fan-out)
       Layer C: conditional route (2 nodes, when/branch)
       Layer D: gate              (1 node, fan-in)
       ========================================================= -->

  <!-- EDGES (drawn first, under nodes) -->
  <!-- A -> B  (fan-out: 1 source to 3 parallel) -->
  <g stroke="#5566B8" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.85">
    <path d="M214 360 C252 360, 256 312, 296 312"/>
    <path d="M214 360 C252 360, 256 360, 296 360"/>
    <path d="M214 360 C252 360, 256 408, 296 408"/>
  </g>
  <!-- B -> C  (fan-in 3 to 2, then conditional split) -->
  <g stroke="#7A5CC0" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.85">
    <path d="M428 312 C470 312, 474 330, 514 330"/>
    <path d="M428 360 C470 360, 474 330, 514 330"/>
    <path d="M428 408 C470 408, 474 408, 514 408"/>
    <path d="M428 360 C470 360, 474 408, 514 408"/>
  </g>
  <!-- C -> D  (fan-in 2 to gate) -->
  <g stroke="#B08A50" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.85">
    <path d="M646 330 C690 330, 694 372, 736 372"/>
    <path d="M646 408 C690 408, 694 372, 736 372"/>
  </g>
  <!-- arrowheads -->
  <g fill="#6E8BFF"><path d="M296 312 l-9 -5 v10 z"/><path d="M296 360 l-9 -5 v10 z"/><path d="M296 408 l-9 -5 v10 z"/></g>
  <g fill="#A78BFA"><path d="M514 330 l-9 -5 v10 z"/><path d="M514 408 l-9 -5 v10 z"/></g>
  <g fill="#F0B45A"><path d="M736 372 l-9 -5 v10 z"/></g>

  <!-- NODES -->
  <!-- Layer A: source (agent) -->
  <rect x="98" y="334" width="116" height="52" rx="12" fill="#121A2C" stroke="#33406B"/>
  <circle cx="120" cy="352" r="4.5" fill="#6E8BFF"/>
  <text x="134" y="356" font-family="ui-monospace,Menlo,monospace" font-size="14" font-weight="700" fill="#E7ECF7">discover</text>
  <text x="116" y="376" font-family="ui-monospace,Menlo,monospace" font-size="9.5" letter-spacing="0.6" fill="#7C89AE">agent</text>

  <!-- Layer B: 3 parallel map nodes -->
  <g>
    <rect x="298" y="288" width="130" height="48" rx="11" fill="#131A2E" stroke="#3A3463"/>
    <circle cx="318" cy="305" r="4" fill="#A78BFA"/>
    <text x="332" y="309" font-family="ui-monospace,Menlo,monospace" font-size="13" font-weight="700" fill="#E7ECF7">audit·auth</text>
    <text x="316" y="326" font-family="ui-monospace,Menlo,monospace" font-size="9" letter-spacing="0.6" fill="#9683C6">map · item 1</text>
  </g>
  <g>
    <rect x="298" y="336" width="130" height="48" rx="11" fill="#131A2E" stroke="#3A3463"/>
    <circle cx="318" cy="353" r="4" fill="#A78BFA"/>
    <text x="332" y="357" font-family="ui-monospace,Menlo,monospace" font-size="13" font-weight="700" fill="#E7ECF7">audit·db</text>
    <text x="316" y="374" font-family="ui-monospace,Menlo,monospace" font-size="9" letter-spacing="0.6" fill="#9683C6">map · item 2</text>
  </g>
  <g>
    <rect x="298" y="384" width="130" height="48" rx="11" fill="#131A2E" stroke="#3A3463"/>
    <circle cx="318" cy="401" r="4" fill="#A78BFA"/>
    <text x="332" y="405" font-family="ui-monospace,Menlo,monospace" font-size="13" font-weight="700" fill="#E7ECF7">audit·api</text>
    <text x="316" y="422" font-family="ui-monospace,Menlo,monospace" font-size="9" letter-spacing="0.6" fill="#9683C6">map · item N</text>
  </g>
  <!-- fan-out bracket label -->
  <text x="363" y="456" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="9.5" letter-spacing="1.8" fill="#7E70AE">FAN-OUT · concurrent</text>

  <!-- Layer C: conditional branches (when) -->
  <g>
    <rect x="516" y="306" width="130" height="48" rx="11" fill="#151430" stroke="#4A426A"/>
    <circle cx="536" cy="323" r="4" fill="#B692FF"/>
    <text x="550" y="327" font-family="ui-monospace,Menlo,monospace" font-size="13" font-weight="700" fill="#E7ECF7">deep-fix</text>
    <text x="534" y="344" font-family="ui-monospace,Menlo,monospace" font-size="9" letter-spacing="0.5" fill="#8C99C0">when high</text>
  </g>
  <g>
    <rect x="516" y="384" width="130" height="48" rx="11" fill="#151430" stroke="#4A426A"/>
    <circle cx="536" cy="401" r="4" fill="#B692FF"/>
    <text x="550" y="405" font-family="ui-monospace,Menlo,monospace" font-size="13" font-weight="700" fill="#E7ECF7">quick-fix</text>
    <text x="534" y="422" font-family="ui-monospace,Menlo,monospace" font-size="9" letter-spacing="0.5" fill="#8C99C0">when low</text>
  </g>
  <text x="581" y="456" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="9.5" letter-spacing="1.8" fill="#8C7CC0">ROUTE · when / join</text>

  <!-- Layer D: gate (quality fan-in) -->
  <rect x="738" y="344" width="120" height="56" rx="13" fill="#1A1A2A" stroke="#6E5A33"/>
  <circle cx="760" cy="364" r="4.5" fill="#F0B45A"/>
  <text x="774" y="368" font-family="ui-monospace,Menlo,monospace" font-size="15" font-weight="700" fill="#E7ECF7">gate</text>
  <text x="756" y="388" font-family="ui-monospace,Menlo,monospace" font-size="9.5" letter-spacing="0.6" fill="#C79A56">VERDICT: PASS</text>
  <text x="798" y="424" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="9.5" letter-spacing="1.6" fill="#B0894F">FAN-IN · halt or pass</text>

  <!-- runtime caption -->
  <text x="489" y="566" text-anchor="middle" font-family="system-ui,'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" fill="#6E7AA0">Every transcript runs &amp; stays inside the runtime.</text>

  <!-- ============ THE CROSSING: only the final result ============ -->
  <path d="M858 372 C912 372, 944 372, 1006 372" stroke="#43D9AD" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M1006 372 l-13 -7 v14 z" fill="#43D9AD"/>
  <circle cx="908" cy="372" r="3.4" fill="#9FE9D4"/>
  <circle cx="950" cy="372" r="3.4" fill="#9FE9D4"/>
  <text x="932" y="352" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="10.5" letter-spacing="0.5" fill="#5FCBAC">only the result</text>

  <!-- ============ YOUR CONTEXT ============ -->
  <rect x="1012" y="266" width="208" height="320" rx="20" fill="#0A1F17" fill-opacity="0.5" stroke="#2B775D"/>
  <rect x="1036" y="250" width="150" height="26" rx="13" fill="#0C231A" stroke="#2F8E73"/>
  <circle cx="1054" cy="263" r="4" fill="#43D9AD"/>
  <text x="1068" y="267" font-family="ui-monospace,Menlo,monospace" font-size="11.5" letter-spacing="1" fill="#7FD8BC">YOUR CONTEXT</text>

  <g filter="url(#glow)">
    <rect x="1040" y="338" width="152" height="72" rx="15" fill="#0E2A20" stroke="#43D9AD"/>
  </g>
  <circle cx="1066" cy="374" r="5" fill="#43D9AD"/>
  <text x="1082" y="369" font-family="ui-monospace,Menlo,monospace" font-size="16" font-weight="700" fill="#EAFBF4">report</text>
  <text x="1082" y="391" font-family="ui-monospace,Menlo,monospace" font-size="10" letter-spacing="0.6" fill="#6FD6B6">final · returned</text>
  <text x="1116" y="466" text-anchor="middle" font-family="system-ui,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12.5" fill="#5C9A86">Your window stays clean.</text>

  <!-- ============ PHASE-TYPE TOOLBOX (the "I have so many mechanisms" proof) ============ -->
  <text x="640" y="612" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="10" letter-spacing="2" fill="#5C6A92">9 PHASE TYPES</text>
  <g font-family="ui-monospace,Menlo,monospace" font-size="11.5" font-weight="600" text-anchor="middle">
    <rect x="206" y="624" width="74" height="26" rx="13" fill="#0E1825" stroke="#26345A"/><text x="243" y="641" fill="#9FB6F0">agent</text>
    <rect x="288" y="624" width="84" height="26" rx="13" fill="#0E1825" stroke="#26345A"/><text x="330" y="641" fill="#9FB6F0">parallel</text>
    <rect x="380" y="624" width="60" height="26" rx="13" fill="#101a2e" stroke="#3A3463"/><text x="410" y="641" fill="#C6B6F2">map</text>
    <rect x="448" y="624" width="62" height="26" rx="13" fill="#1A1622" stroke="#6E5A33"/><text x="479" y="641" fill="#F2C078">gate</text>
    <rect x="518" y="624" width="76" height="26" rx="13" fill="#0E1825" stroke="#26345A"/><text x="556" y="641" fill="#9FB6F0">reduce</text>
    <rect x="602" y="624" width="92" height="26" rx="13" fill="#0E1825" stroke="#26345A"/><text x="648" y="641" fill="#9FB6F0">approval</text>
    <rect x="702" y="624" width="60" height="26" rx="13" fill="#0E1825" stroke="#26345A"/><text x="732" y="641" fill="#9FB6F0">flow</text>
    <rect x="770" y="624" width="60" height="26" rx="13" fill="#0E1825" stroke="#26345A"/><text x="800" y="641" fill="#9FB6F0">loop</text>
    <rect x="838" y="624" width="104" height="26" rx="13" fill="#0F2018" stroke="#2B775D"/><text x="890" y="641" fill="#7FD8BC">tournament</text>
    <rect x="950" y="624" width="124" height="26" rx="13" fill="#0E1825" stroke="#1B3253"/><text x="1012" y="641" fill="#8A96B6">+ when·retry·budget</text>
  </g>
</svg>